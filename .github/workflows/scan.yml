name: Weinstein Weekly Scan
on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance pandas lxml
      - run: python weinstein_scan.py
      - name: Zapisz data.json
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "skan $(date -u +%F)" || echo "brak zmian"
          git push
